{% load vue_utils %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ widget.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0f172a;
            overflow: hidden;
        }

        #widget-display {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div id="widget-display"
     data-api-url="{{ api_url }}"
     data-widget-name="{{ widget.name }}"
     data-stations='{{ stations_json }}'
     data-parameters='{{ parameters_json }}'
     data-rotation-interval="{{ widget.rotation_interval }}"
     data-poll-interval="{{ widget.poll_interval }}"
     data-default-view="{{ widget.default_view }}"
     data-country-iso3="{{ country_iso3 }}"
     data-country-bounds="{{ country_bounds }}">
</div>
<script type="module" crossorigin src="{% vue_bundle_url 'widget-display' %}"></script>
</body>
</html>
